server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/xml
        font/woff2;

    # Hashed build assets (index-xxxx.js / .css) — cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached (so new deploys take effect)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — serve index.html for any unknown path
    location / {
        try_files $uri $uri/ /index.html;
    }
}
